<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled | ClearPath</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="payment-tailwind.js"></script>
    <link rel="stylesheet" href="payment.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 relative">

    <div class="bg-shapes">
        <!-- Top Right Cluster -->
        <div class="shape-cluster top-right">
            <div class="box box-1"></div>
            <div class="box box-2"></div>
            <div class="box box-3"></div>
            <div class="box box-4"></div>
        </div>
        <!-- Bottom Left Cluster -->
        <div class="shape-cluster bottom-left">
            <div class="box box-1"></div>
            <div class="box box-2"></div>
            <div class="box box-3"></div>
            <div class="box box-4"></div>
        </div>
    </div>

    <div class="glass-container w-full max-w-md rounded-[2.5rem] p-8 relative overflow-hidden text-center">
        
        <div class="w-20 h-20 bg-yellow-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <i class="fa-solid fa-triangle-exclamation text-4xl text-yellow-500"></i>
        </div>
        <h2 class="text-2xl font-bold mb-2">Payment Cancelled</h2>
        <p class="text-sm text-gray-400 mb-6">You cancelled the PayPal payment process. No charges were made to your account.</p>
        
        <div class="space-y-3">
            <button onclick="window.location.href='../payment/payment.html'" class="btn-glow w-full py-3.5 rounded-xl text-white font-medium shadow-lg">Try Again</button>
            <button onclick="window.location.href='index.html'" class="w-full py-3.5 rounded-xl bg-white/10 hover:bg-white/20 transition-colors text-white font-medium border border-white/10">Return Home</button>
        </div>

    </div>

</body>
</html>
