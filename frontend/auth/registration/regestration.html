    <div class="registerform">
      <!-- form start -->
      <div class="registerr d-flex justify-content-center align-items-center">
        <div class="formholder">

          <form class="form" id="registerForm">
            <p class="title">Register </p>
            <!-- <p class="message">Signup now and get full access to Service Hub ©. </p> -->
            <div class="flex">
              <label for="FirstName">
                <input class="input" type="text" placeholder="" required="" id="FirstName">
                <span>Firstname</span>
              </label>

              <label for="LastName">
                <input class="input" type="text" placeholder="" required="" id="LastName">
                <span>Lastname</span>
              </label>
            </div>

            <label for="email">
              <input class="input" type="email" placeholder="" required="" id="email">
              <span>Email</span>

            </label>

            <label for="phoneNumber">
              <input class="input" type="tel" placeholder="" required="" id="phoneNumber">
              <span>Phone Number</span>
            </label>

            <label for="password">
              <input class="input" type="password" placeholder="" required="" id="password">
              <span>Password</span>
            </label>
            <label for="confirmPassword">
              <input class="input" type="password" placeholder="" required="" id="confirmPassword">
              <span>Confirm password</span>
            </label>
            <label for="age">
              <input type="date" class="input" placeholder="" required="" id="age">
              <span></span>
            </label>


            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="inlineRadioOptions" id="Male" value="male">
              <label class="form-check-label" for="Male">Male</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="female">
              <label class="form-check-label" for="inlineRadio2">Female</label>
            </div>

            <button class="submit" type="submit">Submit</button>
            <p class="signin">Already have an acount ? <a class="loginBtn btn btn-primary" href="../login/my_project/login.html">Log In</a> </p>
          </form>
        </div>

      </div>

      <!-- form end -->

    </div>
  </div>
